  function hasIOSBridge() { return !!(window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers[HANDLER_NAME]); }

  function isInIframe() { return !!(window.parent && window.parent !== window); }
  function sendEvent(eventName, payload) {

    if (hasIOSBridge()) { try { window.webkit.messageHandlers[HANDLER_NAME].postMessage(message); } catch (e) { console.error("Error sending to iOS:", e); } }
    else if (hasAndroidBridge()) { try { window[ANDROID_BRIDGE_NAME].postEvent(JSON.stringify(message)); } catch (e) { console.error("Error sending to Android:", e); } }

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Solar - BAJA PRO-SERVICES</title>

<style>
:root {
  --primary: #0f172a;
  --secondary: #1e293b;
  --accent: #3b82f6;
  --text: #f8fafc;
  --text-muted: #94a3b8;
  --card-bg: #1e293b;
  --white: #ffffff;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { background: var(--primary); color: var(--text); padding-bottom: 80px; }

header { background: var(--secondary); padding: 1.5rem; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); }
.header-top { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
.brand { display: flex; align-items: center; gap: 1rem; }
.logo-placeholder { width: 45px; height: 45px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; }

.lang-selector { display: flex; gap: 0.5rem; }
.lang-btn { background: white; color: var(--primary); border: none; padding: 5px 12px; border-radius: 15px; cursor: pointer; font-weight: 600; font-size: 0.8rem; transition: 0.3s; }
.lang-btn.active { background: var(--accent); color: white; }

.title { text-align: center; margin-top: 1rem; }
.title h1 { font-size: 1.5rem; margin-bottom: 0.2rem; }
.title p { font-size: 0.9rem; color: var(--text-muted); }

.filter-bar { display: flex; overflow-x: auto; gap: 10px; padding: 1rem; max-width: 1200px; margin: 0 auto; scrollbar-width: none; }
.filter-bar::-webkit-scrollbar { display: none; }
.filter-btn { background: var(--secondary); color: var(--text); border: 1px solid #334155; padding: 8px 18px; border-radius: 20px; white-space: nowrap; cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
.filter-btn.active { background: var(--accent); border-color: var(--accent); }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; padding: 1rem; max-width: 1200px; margin: 0 auto; }
.card { background: var(--card-bg); border-radius: 15px; overflow: hidden; transition: 0.3s; border: 1px solid #334155; display: flex; flex-direction: column; }
.card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); border-color: var(--accent); }
.card-img { width: 100%; height: 200px; background: #fff; position: relative; }
.card-img img { width: 100%; height: 100%; object-fit: contain; padding: 10px; }
.card-tag { position: absolute; top: 10px; right: 10px; background: var(--accent); color: white; padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; }

.card-info { padding: 1.2rem; flex-grow: 1; display: flex; flex-direction: column; }
.card-brand { color: var(--accent); font-size: 0.8rem; font-weight: bold; text-transform: uppercase; margin-bottom: 0.4rem; }
.card-model { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.4rem; }
.card-cap { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1rem; }
.card-price { font-size: 1.4rem; font-weight: bold; color: #10b981; margin-top: auto; }

.add-btn { background: var(--accent); color: white; border: none; width: 100%; padding: 12px; border-radius: 10px; margin-top: 1rem; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
.add-btn:active { transform: scale(0.95); }

.floating-cart { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: white; padding: 15px 25px; border-radius: 30px; display: flex; align-items: center; gap: 10px; box-shadow: 0 5px 15px rgba(59,130,246,0.4); cursor: pointer; z-index: 1000; font-weight: bold; }

.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; padding: 1rem; }
.modal-content { background: var(--secondary); width: 100%; max-width: 500px; border-radius: 20px; padding: 1.5rem; max-height: 80vh; overflow-y: auto; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid #334155; padding-bottom: 1rem; }
.cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; background: #334155; padding: 10px; border-radius: 10px; }
.qty-ctrl { display: flex; align-items: center; gap: 10px; }
.qty-btn { background: var(--accent); border: none; color: white; width: 25px; height: 25px; border-radius: 5px; cursor: pointer; }

.checkout-btn { width: 100%; background: #25d366; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 1.5rem; display: flex; align-items: center; justify-content: center; gap: 10px; }

@media (max-width: 600px) {
  .grid { grid-template-columns: 1fr 1fr; gap: 0.8rem; padding: 0.8rem; }
  .card-img { height: 140px; }
  .card-model { font-size: 0.9rem; }
  .card-price { font-size: 1.1rem; }
  .title h1 { font-size: 1.2rem; }
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="brand">
      <div class="logo-placeholder">BP</div>
      <div class="lang-selector">
        <button class="lang-btn active" id="lang-es" onclick="setLang('es')">ES</button>
        <button class="lang-btn" id="lang-en" onclick="setLang('en')">EN</button>
      </div>
    </div>
    <div class="search-box">
      <i class="fas fa-sun" style="color: #fbbf24; font-size: 1.5rem;"></i>
    </div>
  </div>
  <div class="title">
    <h1>Catálogo Solar BAJA PRO-SERVICES</h1>
    <p>Tecnología renovable para tu hogar y negocio</p>
  </div>
</header>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" onclick="filterBy('todos')">Todos</button>
  <button class="filter-btn" onclick="filterBy('Panel')">Paneles</button>
  <button class="filter-btn" onclick="filterBy('Inversor')">Inversores</button>
  <button class="filter-btn" onclick="filterBy('Bateria')">Baterías</button>
  <button class="filter-btn" onclick="filterBy('Controlador')">Controladores</button>
  <button class="filter-btn" onclick="filterBy('Estructura')">Montaje</button>
</div>

<div class="grid" id="productGrid"></div>

<div class="floating-cart" onclick="abrirModal()">
  <i class="fas fa-shopping-cart"></i>
  <span id="cartCount">0</span>
  <span id="cartTotalHeader">$0.00</span>
</div>

<div class="modal" id="cartModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Tu Cotización</h2>
      <button onclick="cerrarModal()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
    </div>
    <div id="cartItems"></div>
    <div style="margin-top: 1.5rem; border-top: 1px solid #334155; padding-top: 1rem;">
      <div style="display:flex; justify-content:space-between; font-size:1.3rem; font-weight:bold;">
        <span>TOTAL:</span>
        <span id="totalUSD">$0.00</span>
      </div>
      <button class="checkout-btn" onclick="enviarWhatsApp()">
        <i class="fab fa-whatsapp"></i> Enviar a WhatsApp
      </button>
    </div>
  </div>
</div>

<script>
// IMÁGENES ACTUALIZADAS SEGÚN ARCHIVOS SUBIDOS
const data = [
  { id: 1, marca: 'Seraphim', cat: 'Panel', modelo: 'N-TOPCon 580W', capacidad: '580W Bifacial', precio: 145, img: 'seraphim solar.png' },
  { id: 2, marca: 'Sungrow', cat: 'Inversor', modelo: 'SG10RT-V115', capacidad: '10kW Trifásico', precio: 1250, img: 'sungrow inversor.png' },
  { id: 3, marca: 'Solis', cat: 'Inversor', modelo: 'S6-GR1P5K', capacidad: '5kW Residencial', precio: 890, img: 'solis inversor.png' },
  { id: 4, marca: 'SRNE', cat: 'Controlador', modelo: 'MC48100N15', capacidad: '100A MPPT 48V', precio: 320, img: 'srne controlador.png' },
  { id: 5, marca: 'Yassion', cat: 'Inversor', modelo: 'Off-Grid 5kVA', capacidad: '5000W 48V', precio: 650, img: 'yassion inversor.png' },
  { id: 6, marca: 'Zbeny', cat: 'Protección', modelo: 'Combiner Box', capacidad: '4 Strings / DC Breakers', precio: 185, img: 'zbeny combinatoria.png' },
  { id: 7, marca: 'Unirac', cat: 'Estructura', modelo: 'SolarMount Kit', capacidad: 'Para 4 Paneles / Techo', precio: 210, img: 'unirac estructura.png' },
  { id: 8, marca: 'Pylontech', cat: 'Bateria', modelo: 'US5000', capacidad: '4.8kWh Litio LFP', precio: 1850, img: 'https://via.placeholder.com/200?text=Pylontech+US5000' }
];

let cart = [];

function init(cat) {
  const grid = document.getElementById('productGrid');
  grid.innerHTML = '';
  const filtered = cat === 'todos' ? data : data.filter(i => i.cat === cat);
  
  filtered.forEach(p => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div class="card-img">
        <span class="card-tag">${p.cat}</span>
        <img src="${p.img}" alt="${p.modelo}">
      </div>
      <div class="card-info">
        <div class="card-brand">${p.marca}</div>
        <div class="card-model">${p.modelo}</div>
        <div class="card-cap">${p.capacidad}</div>
        <div class="card-price">$${p.precio.toLocaleString('en-US')} USD</div>
        <button class="add-btn" onclick="addToCart(${p.id})">
          <i class="fas fa-plus-circle"></i> Agregar
        </button>
      </div>
    `;
    grid.appendChild(div);
  });
}

function filterBy(cat) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  init(cat);
}

function addToCart(id) {
  const item = data.find(p => p.id === id);
  const exists = cart.find(i => i.id === id);
  if (exists) {
    exists.cantidad++;
  } else {
    cart.push({...item, cantidad: 1});
  }
  updateUI();
}

function updateUI() {
  const count = cart.reduce((acc, curr) => acc + curr.cantidad, 0);
  const total = cart.reduce((acc, curr) => acc + (curr.precio * curr.cantidad), 0);
  
  document.getElementById('cartCount').textContent = count;
  document.getElementById('cartTotalHeader').textContent = `$${total.toLocaleString('en-US')}`;
  document.getElementById('totalUSD').textContent = `$${total.toLocaleString('en-US')}`;
}

function abrirModal() {
  const container = document.getElementById('cartItems');
  container.innerHTML = '';
  
  if (cart.length === 0) {
    container.innerHTML = '<p style="text-align:center; padding: 2rem;">El carrito está vacío</p>';
  } else {
    cart.forEach(item => {
      const div = document.createElement('div');
      div.className = 'cart-item';
      div.innerHTML = `
        <div>
          <div style="font-weight:bold">${item.marca} - ${item.modelo}</div>
          <div style="font-size:0.8rem; color:#94a3b8">$${item.precio} x ${item.cantidad}</div>
        </div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
          <span>${item.cantidad}</span>
          <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
        </div>
      `;
      container.appendChild(div);
    });
  }
  document.getElementById('cartModal').style.display = 'flex';
}

function changeQty(id, delta) {
  const item = cart.find(i => i.id === id);
  item.cantidad += delta;
  if (item.cantidad <= 0) {
    cart = cart.filter(i => i.id !== id);
  }
  updateUI();
  abrirModal();
}

function cerrarModal() {
  document.getElementById('cartModal').style.display = 'none';
}

function enviarWhatsApp() {
  if (cart.length === 0) return;
  
  let msg = `*SOLICITUD DE COTIZACIÓN - BAJA PRO-SERVICES*%0A%0A`;
  let total = 0;
  
  const grouped = cart.reduce((r, a) => {
    r[a.marca] = r[a.marca] || [];
    r[a.marca].push(a);
    return r;
  }, {});

  Object.entries(grouped).forEach(([marca, items]) => {
    msg += `*%0A${marca}*%0A`;
    items.forEach(i => {
      const sub = i.precio * i.cantidad;
      total += sub;
      msg += `  • ${i.modelo}%0A`;
      msg += `    Cant: ${i.cantidad} x $${i.precio.toLocaleString('en-US')} = *$${sub.toLocaleString('en-US')}*%0A`;
    });
  });
  
  msg += `%0A━━━━━━━━━━━━━━━━━━━━%0A`;
  msg += `*TOTAL GLOBAL: $${total.toLocaleString('en-US')} USD*%0A%0A`;
  msg += `_Enviado desde Catálogo Digital BAJA PRO-SERVICES_`;
  
  window.open(`https://wa.me/5216122198325?text=${msg}`, '_blank');
}

const tr = {
  es: { title: 'Catálogo Solar BAJA PRO-SERVICES', sub: 'Tecnología renovable para tu hogar y negocio' },
  en: { title: 'BAJA PRO-SERVICES Solar Catalog', sub: 'Renewable technology for home and business' }
};

function setLang(l) {
  document.querySelector('.title h1').textContent = tr[l].title;
  document.querySelector('.title p').textContent = tr[l].sub;
  document.getElementById('lang-es').className = l === 'es' ? 'lang-btn active' : 'lang-btn';
  document.getElementById('lang-en').className = l === 'en' ? 'lang-btn active' : 'lang-btn';
}

init("todos");
</script>
</body></html>
