    let cart = [];
    let currentLang = 'es';

    const translations = {
        es: {
            all: "TODOS",
            stock: "STOCK:",
            add: "AGREGAR",
            modal: "Solicitud de Cotización",
            total: "Total Global:",
            btnSend: "SOLICITAR TOTAL",
            wsHeader: "*SOLICITUD DE COTIZACIÓN - BAJA PRO-SERVICES*",
            required: "Nombre, Ciudad y Teléfono son obligatorios."
        },
        en: {
            all: "ALL",
            stock: "STOCK:",
            add: "ADD TO CART",
            modal: "Quote Request",
            total: "Grand Total:",
            btnSend: "REQUEST QUOTE",
            wsHeader: "*QUOTE REQUEST - BAJA PRO-SERVICES*",
            required: "Name, City, and Phone are required."
        }
    };

    function init() {
        renderBrandFilters();
        renderProducts('TODOS');
    }

    function renderBrandFilters() {
        const container = document.getElementById('brandNav');
        const brands = [...new Set(products.map(p => p.img.split('.')[0]))];
        
        let html = `
            <div onclick="renderProducts('TODOS')" class="flex-shrink-0 cursor-pointer group text-center">
                <div class="w-16 h-16 bg-white rounded-xl shadow flex items-center justify-center border-2 border-transparent group-hover:border-green-500 transition-all">
                    <i class="fas fa-th text-blue-900 text-xl"></i>
                </div>
                <span class="text-[10px] font-bold text-blue-900 mt-2 block uppercase">${translations[currentLang].all}</span>
            </div>`;

        brands.forEach(brand => {
            html += `
                <div onclick="renderProductsByBrand('${brand}')" class="flex-shrink-0 cursor-pointer group text-center">
                    <div class="w-16 h-16 bg-white rounded-xl shadow flex items-center justify-center border-2 border-transparent group-hover:border-green-500 transition-all p-2">
                        <img src="img/${brand}.png" class="max-h-full object-contain" onerror="this.src='https://via.placeholder.com/40?text=${brand}'">
                    </div>
                    <span class="text-[10px] font-bold text-blue-900 mt-2 block uppercase">${brand}</span>
                </div>`;
        });
        container.innerHTML = html;
    }

    function renderProducts(filter) {
        const data = filter === 'TODOS' ? products : products.filter(p => p.cat === filter);
        renderGrid(data);
    }

    function renderProductsByBrand(brand) {
        const data = products.filter(p => p.img.split('.')[0] === brand);
        renderGrid(data);
    }

    function renderGrid(data) {
        const grid = document.getElementById('main-catalog');
        grid.innerHTML = data.map(p => `
            <div class="product-card bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col">
                <img src="${p.img}" class="h-44 w-full object-contain mb-4">
                <span class="text-[10px] font-bold text-gray-400 tracking-widest">${p.sku}</span>
                <h3 class="font-bold text-blue-900 text-sm mb-2 h-10 overflow-hidden leading-tight">${p.desc}</h3>
                <p class="text-xs font-semibold text-green-600 mb-4"><i class="fas fa-bolt mr-1"></i>${p.volt}</p>
                <div class="mt-auto">
                    <p class="text-2xl font-black text-blue-900 mb-2">$${p.price.toFixed(2)}</p>
                    <p class="text-[10px] text-gray-500 mb-4 uppercase">${translations[currentLang].stock} ${p.stock}</p>
                    <button onclick="addToCart('${p.sku}')" class="w-full bg-blue-900 text-white py-3 rounded-xl font-bold text-xs hover:bg-green-600 transition tracking-tighter">
                        <i class="fas fa-plus mr-2"></i>${translations[currentLang].add}
                    </button>
                </div>
            </div>
        `).join('');
    }

    function addToCart(sku) {
        const p = products.find(x => x.sku === sku);
        const exists = cart.find(x => x.sku === sku);
        if(exists) exists.qty++; else cart.push({...p, qty: 1});
        document.getElementById('cart-count').innerText = cart.reduce((a,b) => a + b.qty, 0);
        updateUI();
    }

    function toggleCart() {
        const m = document.getElementById('cart-modal');
        m.classList.toggle('hidden');
        if(!m.classList.contains('hidden')) updateUI();
    }

    function updateUI() {
        const list = document.getElementById('cart-list');
        let total = 0;
        let html = `
            <div class="bg-blue-50 p-4 rounded-xl space-y-3 mb-6">
                <input type="text" id="custName" placeholder="Nombre Completo / Full Name" class="w-full p-3 rounded-lg border-none text-sm shadow-sm">
                <select id="custCity" class="w-full p-3 rounded-lg border-none text-sm shadow-sm">
                    <option value="">Seleccionar Ciudad (BCS)...</option>
                    <option value="La Paz">La Paz</option>
                    <option value="Cabo San Lucas">Cabo San Lucas</option>
                    <option value="San José del Cabo">San José del Cabo</option>
                    <option value="Todos Santos">Todos Santos</option>
                    <option value="Los Barriles">Los Barriles</option>
                    <option value="Loreto">Loreto</option>
                </select>
                <input type="tel" id="custPhone" placeholder="Teléfono / Phone" class="w-full p-3 rounded-lg border-none text-sm shadow-sm">
            </div><div class="space-y-2">`;

        cart.forEach(item => {
            total += (item.price * item.qty);
            html += `
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-lg">
                    <span class="font-bold text-blue-900 w-8">${item.qty}x</span>
                    <span class="text-xs flex-1 font-medium">${item.desc}</span>
                </div>`;
        });
        list.innerHTML = html + `</div>`;
        document.getElementById('total-price').innerText = `$${total.toLocaleString('en-US',{minimumFractionDigits:2})}`;
    }

    function sendToWhatsApp() {
        const n = document.getElementById('custName').value;
        const c = document.getElementById('custCity').value;
        const t = document.getElementById('custPhone').value;

        if(!n || !c || !t) return alert(translations[currentLang].required);

        let msg = `${translations[currentLang].wsHeader}\n\n👤 *CLIENTE:* ${n.toUpperCase()}\n📍 *LUGAR:* ${c}\n📞 *TEL:* ${t}\n\n*PARTIDAS:*\n`;
        let grand = 0;
        cart.forEach(i => {
            let sub = i.price * i.qty;
            grand += sub;
            msg += `• ${i.qty}x ${i.desc}\n  SKU: ${i.sku} | Unit: $${i.price} | Sub: $${sub.toFixed(2)}\n\n`;
        });
        msg += `*TOTAL ESTIMADO: $${grand.toLocaleString('en-US')} USD*`;
        window.open(`https://wa.me/526122198325?text=${encodeURIComponent(msg)}`);
    }

    function changeLanguage() {
        currentLang = document.getElementById('lang-switch').value;
        init();
    }

    window.onload = init;
</script>
