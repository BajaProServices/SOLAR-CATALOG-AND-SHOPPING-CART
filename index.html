<index.html>
    <html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAJA PRO-SERVICES | Catálogo Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --aqua-base: #009688; --aqua-dark: #00695c; --aqua-light: #e0f2f1; }
        .bg-aqua-base { background-color: var(--aqua-base); }
        .text-aqua-base { color: var(--aqua-base); }
        .product-list { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-out; }
        .product-list.active { max-height: 3000px; transition: max-height 1s ease-in; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 150, 136, 0.15); }
        
        /* Estilo para el Hero limpio */
        .hero-clean {
            width: 100%;
            height: auto;
            max-height: 500px;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <nav class="bg-white sticky top-0 z-50 shadow-md border-b border-aqua-light">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-aqua-base rounded-full flex items-center justify-center text-white font-bold">BPS</div>
                <span class="text-xl font-black tracking-tighter text-aqua-dark uppercase">Baja Pro-Services</span>
            </div>
            <button onclick="scrollToForm()" class="bg-aqua-base text-white px-6 py-2 rounded-full font-bold hover:bg-teal-700 transition-all">
                Ver Carrito <span id="cart-count" class="bg-white text-aqua-base px-2 rounded-full ml-1">0</span>
            </button>
        </div>
    </nav>

    <header class="w-full bg-white overflow-hidden">
        <img src="hero.png" alt="Baja Pro Services Hero" class="hero-clean">
    </header>

    <div class="bg-aqua-base py-3">
        <div class="container mx-auto px-4">
            <p class="text-center text-white font-medium text-xs md:text-sm uppercase tracking-widest">
                La Paz • Los Cabos • Loreto • Constitucion • Mulegé
            </p>
        </div>
    </div>

    <main class="container mx-auto px-4 py-12">
        <h2 class="text-3xl font-bold text-center mb-10 text-slate-700 uppercase tracking-tight">Equipos Disponibles</h2>
        
        <div id="brands-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <section id="contact-form" class="bg-white py-16 border-t border-aqua-light">
        <div class="container mx-auto px-4 max-w-2xl">
            <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200 mb-8 shadow-inner">
                <h3 class="font-bold text-slate-700 mb-4 flex items-center gap-2 italic">
                    <i class="fas fa-shopping-cart text-aqua-base"></i> RESUMEN DE COTIZACIÓN:
                </h3>
                <div id="summary-list" class="space-y-2 text-sm text-gray-600 mb-6">
                    El carrito está vacío.
                </div>
                <div class="flex justify-between items-center border-t pt-4">
                    <span class="text-lg font-bold text-slate-700">TOTAL GLOBAL:</span>
                    <span id="summary-total" class="text-3xl font-black text-aqua-base">$0.00 USD</span>
                </div>
            </div>

            <form id="quoteForm" class="space-y-4">
                <input type="text" id="fullname" placeholder="Nombre Completo" required class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-aqua-base">
                <input type="tel" id="phone" placeholder="WhatsApp" required class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-aqua-base">
                <input type="text" id="address" placeholder="Ciudad / Dirección de instalación" required class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-aqua-base">
                
                <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-3 transition-all shadow-lg text-lg">
                    <i class="fab fa-whatsapp text-2xl"></i> ENVIAR AL WHATSAPP
                </button>
            </form>
        </div>
    </section>

    <script>
        const catalogo = [
            {
                categoria: "Inversores Sol-Ark",
                imagen: "8Kw_48V_SOL-ARK.png",
                productos: [
                    { desc: "Sol-Ark 8K-48V Híbrido", "stock": 15, price: 6850, img: "8Kw_48V_SOL-ARK.png" },
                    { desc: "Sol-Ark 12K-2P Híbrido", "stock": 15, price: 7950, img: "12K2P-p-SOL-ARK.png" },
                    { desc: "Sol-Ark 15K-2P Hibrido", "stock": 15, price: 9200, img: "Sol-Ark_15Kw_48V-220VCA.png" },
                    { desc: "Sol-Ark 30K-3P Hibrido Industrial", "stock": 15, price: 15800, img: "Sol-Ark_30Kw_3P.png" }
                ]
                      },
                   }
            {    
                categoria:"Baterias LiFePO4"
                imagen: "Bateria Pytes 48v 11.7 Kw.png",
                productos: [ BYD (Litio LV y HV)
            { desc: "BAT BYD LITIO 5KWH LV FLEX LITE", volt: "48V", price: 1529.57, , stock: 8, img: "byd_lv_flex.png" },
            { desc: "ACC BYD CONTROLADOR LV BMU", volt: "N/A", price: 160.95, , stock: 50, img: "byd_bmu.png" },
            { desc: "ACC BYD SOPORTE AJUSTABLE LV (4 PZAS)", volt: "N/A", price: 8.98, stock: 50, img: "byd_bracket.png" },
            { desc: "ACC BYD CONTROLADOR HV BCU", volt: "HV", price: 728.79, stock: 10, img: "byd_bcu_hv.png" },
            { desc: "BAT HUAWEI 7K HV LI-ION", volt: "HV", price: 3248.70, cat: "BAT", stock: 5, img: "huawei_luna_7k.png" },

            // Growatt (AXE, ALP y Portátiles)
            { desc: "BATERÍA GROWATT AXE 5.0L (COBALTO FREE)", volt: "48V", price: 1298.70, cat: "BAT", stock: 8, img: "growatt_axe.png" },
            { desc: "BATERÍA GROWATT ALP 5.0L", volt: "48V", price: 1244.10, cat: "BAT", stock: 8, img: "growatt_alp.png" },
            {desc: "BAT PORTABLE GROWATT INFINITY 1500", volt: "110V AC OUT", price: 1360.52, cat: "BAT", stock: 5, img: "growatt_infinity.png" },
            {desc: "KIT CABLES MULTI TORRES GROWATT", volt: "N/A", price: 119.34, cat: "ACC", stock: 50, img: "growatt_cable_kit.png" },
            { desc: "ACC GROWATT ARK LV HUB-A1", volt: "N/A", price: 388.96, cat: "ACC", stock: 20, img: "growatt_ark_hub.png" },
            { desc: "ACC GROWATT CABLES BATERIA AXE", volt: "N/A", price: 97.50, cat: "ACC", stock: 50, img: "growatt_axe_cables.png" },
            { desc: "ACC GROWATT BASE BATERIA ALP", volt: "N/A", price: 88.40, cat: "ACC", stock: 50, img: "growatt_alp_base.png" },

            // Soluna
            { sku: "PV-BT-10KLV-SOL", desc: "BAT SOLUNA 10KW LV LI-ION", volt: "48V", price: 2535.00, cat: "BAT", stock: 8, img: "soluna_10k.png" },
            { sku: "PV-ACC-CJA-SOL", desc: "ACC SOLUNA CAJA CONEXION PARALELO", volt: "N/A", price: 124.80, cat: "ACC", stock: 20, img: "soluna_box.png" },

                    { desc: "Pytes E-BOX 48100R 5.1Kw", "stock": 15, price: 1650, img: "EBOX48100R-p.png" },
                    { desc: "Pytes 48V 11.7Kw High Cap", "stock": 15, price: 3450, img: "Bateria Pytes 48v 11.7 Kw.png" },
                    { desc: "Must 48V 5.1Kw LiFePO4", "stock": 15, price: 1420, img: "Bateria-Must-48V-5.1-Kw-LiFePO4.png" },
                    { desc: "epcom RES100 5Kw Wall", "stock": 15, price: 1550, img: "RES1005K-p.png" },
                    { desc: "epcom RES200 10Kw Wall", "stock": 15, price: 2950, img: "RES20010K-p.png" },
                    { desc: "Growatt AXE 5.0L Litio", "stock": 15, price: 1580, img: "AXE5.0LC1-p.png" }
                ]
            },   
            {    
                categoria:"Baterias Plomo-Ácido"
                imagen: "Bateria Plomo-Acido.png",
                productos: [
            { desc: "BATERIA DEKA MARINE 105AH 12V", volt: "12V", "stock": 15, price: 213.55, cat: "BAT", stock: 20, img: "deka_105.png" },
            { sku: "PV-BT-180-PM", desc: "BATERIA DEKA 180AH 12V", volt: "12V", "stock": 15,  price: 321.44, cat: "BAT", stock: 20, img: "deka_180.png" },
            { sku: "PV-BT-115-US", desc: "BATERIA ULTRASTART 115AH 12V CICLO PROFUNDO", volt: "12V", "stock": 15, price: 181.03, cat: "BAT", stock: 20, img: "ultrastart_115.png" }
             }

            {
                categoria: "Paneles y Kits Solares",
                imagen: "LP210210M66NB700W-p.png",
                productos: [
                    { desc: "Panel Solar 700W Monocristalino", price: 285, img: "LP210210M66NB700W-p.png" },
                    { desc: "Ektor EPL 450W Mono", price: 185, img: "EPL450M144-p.png" },
                    { desc: "Ektor EPL 540W Mono", price: 215, img: "EPL540M144-p.png" },
                    { desc: "KIT Hybrid 8K Sol-Ark + Paneles", price: 8900, img: "KITHYBRID8KSOL-h.jpg" },
                    { desc: "KIT 8 Paneles Ektor con Estructura", price: 1850, img: "KIT8PVEKTOR8R-p.png" }
                ]
            }
        ];

        let cart = [];

        function render() {
            const container = document.getElementById('brands-container');
            catalogo.forEach((cat, index) => {
                const div = document.createElement('div');
                div.className = 'bg-white rounded-2xl overflow-hidden card-shadow border border-slate-100 cursor-pointer';
                div.innerHTML = `
                    <div class="p-6" onclick="toggle(${index})">
                        <img src="${cat.imagen}" class="h-32 w-full object-contain mb-4">
                        <h3 class="text-xl font-black text-slate-800 uppercase">${cat.categoria}</h3>
                        <p class="text-aqua-base font-bold text-xs mt-1">TOQUE PARA VER MODELOS</p>
                    </div>
                    <div id="cat-${index}" class="product-list bg-slate-50">
                        <div class="p-4 space-y-3">
                            ${cat.productos.map(p => `
                                <div class="bg-white p-3 rounded-xl shadow-sm border flex items-center gap-3">
                                    <img src="${p.img}" class="w-12 h-12 object-contain">
                                    <div class="flex-1">
                                        <p class="text-[11px] font-bold leading-tight">${p.desc}</p>
                                        <p class="text-aqua-base font-black">$${p.price.toLocaleString()} USD</p>
                                    </div>
                                    <button onclick="add('${p.desc}', ${p.price})" class="bg-aqua-base text-white px-3 py-1 rounded-lg text-xs font-bold">+ Añadir</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function toggle(i) {
            document.getElementById(`cat-${i}`).classList.toggle('active');
        }

        function add(d, p) {
            cart.push({d, p});
            update();
        }

        function update() {
            const list = document.getElementById('summary-list');
            const count = document.getElementById('cart-count');
            count.innerText = cart.length;
            
            if(cart.length === 0) {
                list.innerHTML = "El carrito está vacío.";
            } else {
                list.innerHTML = cart.map((item, i) => `
                    <div class="flex justify-between border-b pb-1">
                        <span>${item.d}</span>
                        <div class="flex gap-2 font-bold">
                            <span>$${item.p}</span>
                            <button onclick="remove(${i})" class="text-red-500">×</button>
                        </div>
                    </div>
                `).join('');
            }
            const total = cart.reduce((s, i) => s + i.p, 0);
            document.getElementById('summary-total').innerText = `$${total.toLocaleString()} USD`;
        }

        function remove(i) { cart.splice(i, 1); update(); }

        function scrollToForm() { document.getElementById('contact-form').scrollIntoView({ behavior: 'smooth' }); }

        document.getElementById('quoteForm').addEventListener('submit', (e) => {
            e.preventDefault();
            if(cart.length === 0) return alert("Añade productos primero");
            
            const n = document.getElementById('fullname').value;
            const p = document.getElementById('phone').value;
            const a = document.getElementById('address').value;
            const t = cart.reduce((s, i) => s + i.p, 0);
            const items = cart.map(i => `- ${i.d} ($${i.p})`).join('%0A');
            
            const msg = `*NUEVA SOLICITUD - BAJA PRO-SERVICES*%0A%0A*CLIENTE:* ${n}%0A*TEL:* ${p}%0A*DIR:* ${a}%0A%0A*EQUIPOS:*%0A${items}%0A%0A*TOTAL: $${t} USD*`;
            window.open(`https://wa.me/526122198325?text=${msg}`);
        });

        render();
    </script>
</body>
</html>
