        // Funciones principales
        function renderProducts(filterCat = 'all') {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';

            const filtered = filterCat === 'all' 
                ? productos 
                : productos.filter(p => p.cat === filterCat);

            filtered.forEach(producto => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl p-4 card-shadow flex flex-col justify-between';
                card.innerHTML = `
                    <img src="${producto.img}" alt="${producto.desc}" class="h-48 object-contain mb-4">
                    <h3 class="font-bold text-lg mb-2">${producto.desc}</h3>
                    <p class="text-sm text-gray-600 mb-1">${i18n[currentLang].volt}: ${producto.volt}</p>
                    <p class="text-sm text-gray-600 mb-3">${i18n[currentLang].stock}: ${producto.stock}</p>
                    <p class="text-xl font-bold text-aqua-base mb-4">$${producto.price.toFixed(2)} USD</p>
                    <button onclick="addToCart('${producto.sku}')" class="bg-aqua-base hover-aqua text-white py-2 px-4 rounded-lg font-medium transition">
                        ${i18n[currentLang].add}
                    </button>
                `;
                grid.appendChild(card);
            });
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('tabs-container');
            tabsContainer.innerHTML = '';
            const categorias = ['all', 'INV', 'ACC'];
            
            categorias.forEach(cat => {
                const tab = document.createElement('button');
                tab.className = 'py-2 px-4 tab-active';
                tab.textContent = cat === 'all' ? i18n[currentLang].all : (cat === 'ACC' ? i18n[currentLang].acc : cat);
                tab.onclick = () => renderProducts(cat);
                tabsContainer.appendChild(tab);
            });
        }

        function changeLanguage(lang) {
            currentLang = lang;
            document.getElementById('hero-title').textContent = i18n[currentLang].heroT;
            document.getElementById('hero-sub').textContent = i18n[currentLang].heroS;
            document.getElementById('cart-label').textContent = i18n[currentLang].cartL;
            document.getElementById('total-label').textContent = i18n[currentLang].totalL;
            document.getElementById('btn-quote-label').textContent = i18n[currentLang].btnQ;
            renderTabs();
            renderProducts();
            renderCart();
        }

        function addToCart(sku) {
            const item = productos.find(p => p.sku === sku);
            const existente = cart.find(c => c.sku === sku);

            if (existente) {
                existente.cantidad += 1;
            } else {
                cart.push({...item, cantidad: 1});
            }
            updateCartCounter();
            renderCart();
        }

        function updateCartCounter() {
            const total = cart.reduce((sum, item) => sum + item.cantidad, 0);
            document.getElementById('cart-counter').textContent = total;
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';

            if (cart.length === 0) {
                container.innerHTML = `<p class="text-gray-500 text-center">${i18n[currentLang].empty}</p>`;
                return;
            }

            let total = 0;
            cart.forEach(item => {
                total += item.price * item.cantidad;
                const itemEl = document.createElement('div');
                itemEl.className = 'border-b pb-3';
                itemEl.innerHTML = `
                    <h4 class="font-medium">${item.desc}</h4>
                    <p class="text-sm">Cantidad: ${item.cantidad}</p>
                    <p class="text-sm font-bold">$${(item.price * item.cantidad).toFixed(2)} USD</p>
                `;
                container.appendChild(itemEl);
            });

            document.getElementById('cart-total').textContent = `$${total.toFixed(2)} USD`;
        }

        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            sidebar.classList.toggle('translate-x-full');
        }

        function sendWhatsApp() {
            if (cart.length === 0) {
                alert(i18n[currentLang].empty);
                return;
            }

            let mensaje = `*Solicitud de cotización - BAJA PRO-SERVICES*\n\n`;
            cart.forEach(item => {
                mensaje += `• ${item.desc} - Cantidad: ${item.cantidad} - Precio unitario: $${item.price.toFixed(2)} USD\n`;
            });
            const total = cart.reduce((sum, item) => sum + item.price * item.cantidad, 0);
            mensaje += `\n*Total: $${total.toFixed(2)} USD*`;

            const url = `https://wa.me/?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
        }

        // Inicialización
        document.addEventListener('DOMContentLoaded', () => {
            renderTabs();
            renderProducts();
        });
    </script>
