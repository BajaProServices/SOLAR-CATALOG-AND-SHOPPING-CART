  <style>
    *{box-sizing:border-box;margin:0;padding:0}

    body{font-family:'DM Sans',sans-serif;color:var(--txt);background:#f0fdf4;min-height:100vh}
    .hdr{background:var(--dark);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
    .logo{display:flex;flex-direction:column}
    .logo-main{font-family:'Syne',sans-serif;font-weight:800;font-size:1.05rem;color:#4ade80;letter-spacing:-0.01em}
    .logo-sub{font-size:0.65rem;color:#86efac;letter-spacing:0.1em;text-transform:uppercase}
    .cart-btn{background:var(--sun);border:none;color:#1c1c1c;padding:0.5rem 1rem;border-radius:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.8rem;cursor:pointer;display:flex;align-items:center;gap:6px}
    .cart-btn:hover{background:var(--sund);color:#fff}
    .cart-count{background:#1c1c1c;color:var(--sun);border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;min-width:18px}
    .tabs-wrap{background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;white-space:nowrap}
    .tabs{display:inline-flex;gap:0;padding:0 1rem}
    .tab{padding:0.7rem 0.9rem;font-size:0.75rem;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all 0.2s}
    .tab.active{color:var(--sun);border-bottom-color:var(--sun)}
    .tab:hover{color:var(--sun)}
    .cat-badge{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;padding:2px 7px;border-radius:20px;display:inline-block}
    .b-mod{background:#ecfdf5;color:#065f46;border:1px solid #bbf7d0}
    .b-inv{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe}
    .b-bat{background:#fdf4ff;color:#6b21a8;border:1px solid #e9d5ff}
    .b-mon{background:#fff1f2;color:#9f1239;border:1px solid #fecdd3}
    .b-est{background:#f0fdf4;color:#14532d;border:1px solid #bbf7d0}
    .b-acc{background:#fffbeb;color:#78350f;border:1px solid #fde68a}
    .b-cal{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa}
    .b-ref{background:#f0f9ff;color:#075985;border:1px solid #bae6fd}
    .b-bom{background:#f5f3ff;color:#4c1d95;border:1px solid #ddd6fe}
    .b-lum{background:#fefce8;color:#854d0e;border:1px solid #fef08a}
    .b-ctl{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;padding:1rem 1.2rem}
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:0.85rem;cursor:pointer;transition:all 0.18s;position:relative;display:flex;flex-direction:column;gap:6px}
    .card:hover{border-color:var(--sun);box-shadow:0 3px 16px rgba(245,158,11,0.12);transform:translateY(-1px)}
    .card.selected{border-color:var(--sun);background:#fffbeb;box-shadow:0 0 0 2px var(--sun)}
    .card-icon{width:100%;height:60px;border-radius:8px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:1.6rem}
    .card-name{font-size:0.72rem;font-weight:500;color:var(--txt);line-height:1.3;font-family:'Syne',sans-serif}
    .card-model{font-size:0.65rem;color:var(--muted);font-family:'DM Sans',sans-serif}
    .card-cat{margin-top:auto}
    .card-check{position:absolute;top:7px;right:7px;width:18px;height:18px;background:var(--sun);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;opacity:0;transition:opacity 0.2s}
    .card.selected .card-check{opacity:1}
    .qty-ctrl{display:flex;align-items:center;gap:5px;margin-top:4px}
    .qty-btn{width:22px;height:22px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;color:var(--sun);font-weight:700;flex-shrink:0}
    .qty-btn:hover{background:var(--sunl)}
    .qty-num{font-size:0.8rem;font-weight:600;min-width:18px;text-align:center;color:var(--sun)}
    .hint{font-size:0.65rem;color:var(--muted);margin-top:2px}
    .panel{padding:1rem 1.2rem}
    .sum-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:10px}
    .sum-section{font-family:'Syne',sans-serif;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);padding:0.6rem 0 0.3rem;border-top:1px solid var(--border);margin-top:0.5rem}
    .sum-section:first-child{border-top:none;margin-top:0;padding-top:0}
    .sum-row{display:flex;justify-content:space-between;align-items:flex-start;padding:0.4rem 0;border-bottom:1px solid var(--border);font-size:0.8rem}
    .sum-row:last-child{border-bottom:none}
    .sum-name{color:var(--txt);font-weight:500;flex:1;padding-right:8px}
    .sum-model{font-size:0.65rem;color:var(--muted);display:block}
    .sum-qty{color:var(--muted);font-size:0.75rem;margin:0 8px;white-space:nowrap}
    .tot-box{background:var(--dark);border-radius:12px;padding:1.1rem;color:#fff}
    .tot-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .tot-label{font-size:0.7rem;color:#86efac;text-transform:uppercase;letter-spacing:0.06em;font-weight:500}
    .tot-val{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:#fbbf24}
    .wa-btn{width:100%;padding:0.8rem;border-radius:10px;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer;margin-top:10px;transition:all 0.2s;letter-spacing:0.02em}
    .wa-btn.pri{background:var(--sun);color:#1c1c1c}
    .wa-btn.pri:hover{background:var(--sund)}
    .wa-btn.sec{background:#fff;color:var(--sun);border:1.5px solid var(--sun)}
    .wa-btn.sec:hover{background:var(--sunl)}
    .empty{text-align:center;padding:2.5rem 1rem;color:var(--muted)}
    .empty-ico{font-size:2rem;margin-bottom:0.75rem}
    .empty p{font-size:0.85rem;line-height:1.6}
    .note{font-size:0.68rem;color:var(--muted);text-align:center;margin-top:8px}
  </style>

    function renderGrid() {
      const filtered = curcat === 'all'
        ? P.map((p, i) => ({p, i}))
        : P.map((p, i) => ({p, i})).filter(({p}) => p.c === curcat);
      document.getElementById('pg').innerHTML = filtered.map(({p, i}) => {

        return `<div class="card${sel ? ' selected' : ''}" id="cd-${i}" onclick="tog(${i})">

          <div class="card-icon">${p.ic}</div>

          <div class="card-model">${p.m}</div>
          <div class="card-cat"><span class="cat-badge ${p.b}">${p.c}</span></div>
          ${sel ? `<div class="qty-ctrl" onclick="event.stopPropagation()">
            <button class="qty-btn" onclick="chq(${i},-1)">−</button>
            <span class="qty-num">${q}</span>
            <button class="qty-btn" onclick="chq(${i},1)">+</button>
          </div>` : `<div class="hint">Toca para agregar</div>`}
        </div>`;
      }).join('');
    }
    function tog(i) {
      if (cart[i]) { delete cart[i]; }
      else { cart[i] = 1; }
      renderGrid(); updCC();
    }
    function chq(i, d) {
      const nxt = (cart[i] || 0) + d;
      if (nxt <= 0) { delete cart[i]; }
      else { cart[i] = nxt; }
      renderGrid(); updCC();
    }

      curcat = cat;

      document.getElementById('qv').style.display = 'none';
      renderGrid();
    }

      const qp = document.getElementById('qp');
      if (!keys.length) {
        qp.innerHTML = `<div class="empty"><div class="empty-ico">🛒</div><p>Sin productos seleccionados.<br>Elige equipos del catálogo.</p><br><button class="wa-btn sec" onclick="backCat()" style="width:auto;padding:0.5rem 1.2rem;font-size:0.8rem">← Volver al catálogo</button></div>`;
        return;
      }
      const cats = {};
      keys.forEach(i => {
        const p = P[i];
        if (!cats[p.c]) cats[p.c] = [];
        cats[p.c].push({p, i, q: cart[i]});
      });
      let rows = '';
      Object.entries(cats).forEach(([cat, items]) => {
        rows += `<div class="sum-section">${cat}</div>`;
        items.forEach(({p, i, q}) => {
          rows += `<div class="sum-row"><span class="sum-name">${p.n}<span class="sum-model">${p.m}</span></span><span class="sum-qty">× ${q}</span></div>`;
        });
      });
      const totalItems = countCart();
      const totalPw = keys.reduce((a, i) => a + (P[i].pw * (cart[i] || 0)), 0);
      qp.innerHTML = `
        <button class="wa-btn sec" onclick="backCat()" style="width:auto;padding:0.5rem 1rem;font-size:0.75rem;margin-bottom:0.8rem">← Catálogo</button>
        <div class="sum-card">${rows}</div>
        <div class="sum-card" style="background:#f0fdf4;border-color:#bbf7d0;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:0.78rem;color:#166534;font-weight:500">Potencia total estimada</span>
          <span style="font-family:'Syne',sans-serif;font-weight:700;color:#14532d;font-size:1rem">${(totalPw/1000).toFixed(2)} kW</span>
        </div>
        <div class="tot-box">
          <div class="tot-row"><span class="tot-label">Total de equipos seleccionados</span><span class="tot-val">${totalItems} unid.</span></div>
        </div>
        <p class="note">Los precios serán confirmados por nuestro asesor · Stock sujeto a disponibilidad</p>
        <button class="wa-btn pri" onclick="sendWA()">Solicitar cotización por WhatsApp →</button>
      `;
    }
    function backCat() {
      document.getElementById('cv').style.display = 'block';
      document.getElementById('qv').style.display = 'none';
      renderGrid();
    }
    function sendWA() {
      const keys = Object.keys(cart);
      const cats = {};
      keys.forEach(i => {
        const p = P[i];
        if (!cats[p.c]) cats[p.c] = [];
        cats[p.c].push(`• ${p.n} (${p.m}) x${cart[i]}`);
      });
      let msg = 'Hola! Me interesa cotizar los siguientes equipos de BAJA PRO-SERVICES:\\n\\n';
      Object.entries(cats).forEach(([cat, items]) => {
        msg += `*${cat}*\\n${items.join('\\n')}\\n\\n`;
      });
      msg += `Potencia total: ${(Object.keys(cart).reduce((a, i) => a + (P[i].pw * (cart[i] || 0)), 0) / 1000).toFixed(2)} kW\\n¿Pueden confirmar disponibilidad y precios?`;
      window.open(`https://wa.me/5216122198325?text=${encodeURIComponent(msg)}`);
    }
    renderGrid();
  </script>
</body>
</html>
