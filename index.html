<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BAJA PROSERVICES - Catálogo Solar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--aqua:#0ea5a4;--aqua2:#14b8a6;--dark:#064e4b;--light:#ecfeff;--bg:#f0fdfa;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--ink)}
h1,h2,h3{font-family:Syne,sans-serif;font-weight:700}
.header{background:linear-gradient(135deg,var(--dark) 0%,var(--aqua) 100%);position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(6,78,75,.15)}
.header-top{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;max-width:1400px;margin:0 auto}
.brand{display:flex;align-items:center;gap:12px;color:white}
.brand-icon{width:42px;height:42px;background:rgba(255,255,255,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.brand h1{font-size:20px}
.brand p{font-size:11px;opacity:.85;letter-spacing:.05em;text-transform:uppercase}
.nav{display:flex;background:rgba(0,0,0,.1);overflow-x:auto}
.tab{flex:1;min-width:150px;padding:18px 20px;background:none;border:none;color:rgba(255,255,255,.8);font-family:Syne,sans-serif;font-weight:600;font-size:14px;cursor:pointer;position:relative;white-space:nowrap}
.tab.active{color:white}
.tab.active::after{content:'';position:absolute;bottom:0;left:25%;right:25%;height:3px;background:white;border-radius:3px 3px 0 0}
.tab span{display:block;font-size:11px;opacity:.7;margin-top:2px}
.hero{position:relative;height:360px;overflow:hidden;display:none}
.hero.active{display:block}
.hero img{width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(100deg,rgba(6,78,75,.95) 0%,rgba(6,78,75,.6) 50%,transparent 80%);display:flex;align-items:center}
.hero-content{max-width:1400px;margin:0 auto;padding:0 24px;color:white}
.hero-badge{background:var(--aqua);display:inline-flex;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;text-transform:uppercase;margin-bottom:16px}
.hero h2{font-size:44px;line-height:1.1;margin-bottom:12px;max-width:600px}
.hero p{font-size:18px;opacity:.9}
.main{max-width:1400px;margin:0 auto;padding:28px 20px}
.page{display:none}
.page.active{display:block;animation:fade .3s}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.filters{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.search{flex:1;min-width:260px;position:relative}
.search input{width:100%;padding:13px 16px 13px 44px;border:2px solid var(--line);border-radius:12px;font-size:14px;background:white}
.search input:focus{outline:none;border-color:var(--aqua)}
.search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:9px 18px;border:2px solid var(--line);background:white;border-radius:24px;font-size:13px;font-weight:500;cursor:pointer}
.chip.active{background:var(--aqua);color:white;border-color:var(--aqua)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:22px}
.card{background:white;border-radius:18px;overflow:hidden;box-shadow:0 4px 20px rgba(6,78,75,.08);transition:.3s;border:1px solid transparent}
.card:hover{transform:translateY(-5px);box-shadow:0 12px 32px rgba(6,78,75,.15);border-color:var(--light)}
.card-img{height:210px;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px;position:relative}
.card-img img{max-width:100%;max-height:100%;object-fit:contain}
.card-badge{position:absolute;top:12px;right:12px;background:white;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.card-body{padding:20px}
.card-brand{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.card-brand span{font-size:12px;font-weight:700;color:var(--aqua);text-transform:uppercase;letter-spacing:.05em}
.card-name{font-family:Syne,sans-serif;font-size:18px;font-weight:700;margin-bottom:6px}
.card-spec{font-size:13px;color:var(--muted);margin-bottom:16px;min-height:38px}
.card-foot{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid var(--line)}
.card-power{font-size:14px}
.card-power strong{color:var(--dark);font-size:16px}
.btn{padding:10px 18px;background:var(--aqua);color:white;border:none;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer}
.btn:hover{background:var(--dark)}
.btn.added{background:var(--dark)}
.cart-fab{position:fixed;bottom:26px;right:26px;width:64px;height:64px;background:var(--aqua);color:white;border:none;border-radius:50%;box-shadow:0 8px 28px rgba(14,165,164,.4);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:26px;z-index:90}
.cart-count{position:absolute;top:-5px;right:-5px;background:#ef4444;color:white;width:26px;height:26px;border-radius:50%;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;border:3px solid white}
.cart-panel{position:fixed;top:0;right:-440px;width:100%;max-width:440px;height:100vh;background:white;box-shadow:-12px 0 50px rgba(0,0,0,.18);z-index:200;transition:.35s;display:flex;flex-direction:column}
.cart-panel.open{right:0}
.cart-head{padding:22px;background:var(--dark);color:white;display:flex;align-items:center;justify-content:space-between}
.cart-body{flex:1;overflow-y:auto;padding:20px}
.cart-item{display:flex;gap:14px;padding:16px;background:var(--bg);border-radius:14px;margin-bottom:12px}
.cart-item-img{width:70px;height:70px;background:white;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:8px}
.cart-item-img img{max-width:100%;max-height:100%}
.cart-item-info{flex:1}
.cart-item-name{font-weight:600;font-size:14px;margin-bottom:3px}
.cart-item-spec{font-size:12px;color:var(--muted)}
.cart-qty{display:flex;align-items:center;gap:10px;margin-top:8px}
.qty-btn{width:26px;height:26px;border:1px solid var(--line);background:white;border-radius:7px;cursor:pointer;font-weight:700;color:var(--aqua)}
.cart-foot{padding:22px;border-top:1px solid var(--line);background:var(--bg)}
.cart-total{display:flex;justify-content:space-between;margin-bottom:16px}
.cart-total strong{font-family:Syne,sans-serif;font-size:26px;color:var(--dark)}
.btn-wa{width:100%;padding:15px;background:#25D366;color:white;border:none;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:150;display:none;backdrop-filter:blur(3px)}
.overlay.show{display:block}
@media(max-width:768px){.grid{grid-template-columns:repeat(2,1fr);gap:14px}.hero h2{font-size:30px}.card-img{height:160px}}
</style>
</head>

};
let cart = JSON.parse(localStorage.getItem('bpc')||'{}');
function render(){
  [1,2,3,4].forEach(p=>{
    const g=document.getElementById('g'+p);
    g.innerHTML=DATA[p].map((it,i)=>`
      <div class="card" data-b="${it.b}">
        <div class="card-img"><img src="data:image/png;base64,${it.i}"><div class="card-badge">${it.b}</div></div>
        <div class="card-body">
          <div class="card-brand"><span>${it.b}</span></div>
          <div class="card-name">${it.n}</div>
          <div class="card-spec">${it.s}</div>
          <div class="card-foot">
            <div class="card-power">${it.p?`<strong>${it.p>=1000?it.p/1000+'kW':it.p+'W'}</strong>`:''}</div>
            <button class="btn" onclick="add('${p}-${i}',this)">${cart[p+'-'+i]?'✓':'+ Agregar'}</button>
          </div>
        </div>
      </div>`).join('');
  });
  updateCart();
}
function add(id,btn){cart[id]=(cart[id]||0)+1;localStorage.setItem('bpc',JSON.stringify(cart));btn.textContent='✓';btn.classList.add('added');updateCart();openC();}
function updateCart(){const t=Object.values(cart).reduce((a,b)=>a+b,0);document.getElementById('cc').textContent=t;document.getElementById('cc').style.display=t?'flex':'none';document.getElementById('ct').textContent=t;let h='';Object.entries(cart).forEach(([id,q])=>{const [p,i]=id.split('-');const it=DATA[p][i];h+=`<div class="cart-item"><div class="cart-item-img"><img src="data:image/png;base64,${it.i}"></div><div class="cart-item-info"><div class="cart-item-name">${it.n}</div><div class="cart-item-spec">${it.s}</div><div class="cart-qty"><button class="qty-btn" onclick="chg('${id}',-1)">−</button><span>${q}</span><button class="qty-btn" onclick="chg('${id}',1)">+</button></div></div></div>`});document.getElementById('cb').innerHTML=h||'<div style="text-align:center;padding:60px 20px;color:#64748b">Tu cotización está vacía</div>';}
function chg(id,d){cart[id]+=d;if(cart[id]<=0)delete cart[id];localStorage.setItem('bpc',JSON.stringify(cart));render();}
function openC(){document.getElementById('cp').classList.add('open');document.getElementById('ov').classList.add('show')}
function closeC(){document.getElementById('cp').classList.remove('open');document.getElementById('ov').classList.remove('show')}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');const p=t.dataset.p;document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById('p'+p).classList.add('active');document.getElementById('hero').classList.toggle('active',p==='1');});
document.getElementById('fab').onclick=openC;document.getElementById('ov').onclick=closeC;
document.getElementById('wa').onclick=()=>{const items=Object.entries(cart).map(([id,q])=>{const[p,i]=id.split('-');const it=DATA[p][i];return `• ${it.n} x${q}`}).join('%0A');window.open(`https://wa.me/5216122198325?text=Hola! Quiero cotizar:%0A%0A${items}`,'_blank');};
['s1','s2','s4'].forEach(id=>{const el=document.getElementById(id);if(el)el.oninput=e=>{const v=e.target.value.toLowerCase();const p=id[1];document.querySelectorAll(`#g${p} .card`).forEach(c=>c.style.display=c.textContent.toLowerCase().includes(v)?'':'none');}});
document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{const p=c.closest('.page').id[1];c.parentElement.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));c.classList.add('active');const b=c.dataset.b;document.querySelectorAll(`#g${p} .card`).forEach(card=>card.style.display=b==='all'||card.dataset.b===b?'':'none');});
render();
</script>
