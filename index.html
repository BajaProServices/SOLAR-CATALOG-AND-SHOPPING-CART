    <style>
        :root {
            --primary: #0a192f; /* Azul Medianoche (Elegancia y Confianza) */
            --accent: #d4af37;  /* Oro Metálico (Calidad Premium) */
            --accent-hover: #b8962e;
            --bg-body: #f8f9fa;
            --white: #ffffff;
            --text-main: #1a202c;
            --text-muted: #718096;
            --glass: rgba(255, 255, 255, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }

        body { background-color: var(--bg-body); color: var(--text-main); }

        /* Header Corporativo */
        header {
            background: var(--primary);
            padding: 1.5rem;
            text-align: center;
            border-bottom: 4px solid var(--accent);
        }

        header h1 {
            color: var(--white);
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Hero Section - hero.png */
        .hero-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .hero-image {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: block;
        }

        /* Barra de Navegación Sticky */
        .nav-bar {
            position: sticky;
            top: 0;
            background: var(--glass);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 1rem;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            border-bottom: 1px solid #e2e8f0;
        }

        .btn-filter {
            background: transparent;
            border: 1.5px solid var(--primary);
            color: var(--primary);
            padding: 10px 22px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .btn-filter.active, .btn-filter:hover {
            background: var(--primary);
            color: var(--white);
            transform: translateY(-2px);
        }

        /* Layout Principal */
        .main-layout {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
        }

        @media (max-width: 1024px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        /* Grid de Productos */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #edf2f7;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .card-img-container {
            padding: 20px;
            background: #fdfdfd;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .card-body { padding: 20px; flex-grow: 1; }
        
        .card-sku { color: var(--accent); font-weight: 700; font-size: 0.75rem; text-transform: uppercase; }
        
        .card-title { font-size: 1.15rem; margin: 10px 0; color: var(--primary); height: 2.8em; overflow: hidden; }

        .card-price {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            margin: 15px 0;
        }

        .btn-add {
            width: 100%;
            background: var(--primary);
            color: var(--white);
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-add:hover { background: var(--accent); color: var(--primary); }

        /* Carrito de Cotización */
        .quote-cart {
            background: var(--white);
            border-radius: 15px;
            padding: 25px;
            height: fit-content;
            position: sticky;
            top: 100px;
            border: 2px solid var(--primary);
        }

        .cart-title {
            font-size: 1.4rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
        }
    </style>
</head>

    // 3. RENDERIZADO DINÁMICO
    function renderProducts(filter = 'ALL') {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        
        const filtered = products.filter(p => filter === 'ALL' || p.cat === filter);

        filtered.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-img-container">
                    <img src="${p.img}" alt="${p.desc}" onerror="this.src='https://via.placeholder.com/300?text=Solar+Equipment'">
                </div>
                <div class="card-body">
                    <span class="card-sku">${p.sku}</span>
                    <h3 class="card-title">${p.desc}</h3>
                    <p style="font-size:0.85rem; color:#666;"><strong>${i18n[currentLang].volt}</strong> ${p.volt}</p>
                    <div class="card-price">$${p.price.toLocaleString('en-US', {minimumFractionDigits: 2})} USD</div>
                    <button class="btn-add" onclick="addToCart('${p.sku}')">
                        <i class="fas fa-plus"></i> ${i18n[currentLang].add}
                    </button>
                </div>
            `;
            grid.appendChild(card);
        });

        // Actualizar UI de botones
        document.querySelectorAll('.btn-filter').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('data-filter') === filter);
        });
    }

    function initFilters() {
        const bar = document.getElementById('filter-bar');
        const cats = [
            {id: 'ALL', n: i18n[currentLang].all},
            {id: 'KITS', n: i18n[currentLang].kits},
            {id: 'INV', n: i18n[currentLang].inv},
            {id: 'BATT', n: i18n[currentLang].batt},
            {id: 'PANELS', n: i18n[currentLang].panels}
        ];
        bar.innerHTML = cats.map(c => `
            <button class="btn-filter" data-filter="${c.id}" onclick="renderProducts('${c.id}')">${c.n}</button>
        `).join('');
    }
        // 4. GESTIÓN DEL CARRITO (Lógica Interna)
    function addToCart(sku) {
        const product = products.find(p => p.sku === sku);
        const itemInCart = cart.find(item => item.sku === sku);

        if (itemInCart) {
            itemInCart.quantity++;
        } else {
            cart.push({ ...product, quantity: 1 });
        }
        updateCartUI();
    }

    function removeFromCart(sku) {
        cart = cart.filter(item => item.sku !== sku);
        updateCartUI();
    }

    function updateCartUI() {
        const cartContent = document.getElementById('cart-content');
        const totalVal = document.getElementById('total-val');
        cartContent.innerHTML = '';
        let total = 0;

        if (cart.length === 0) {
            cartContent.innerHTML = `<p style="text-align:center; color:var(--text-muted); padding:20px;">${i18n[currentLang].empty}</p>`;
        } else {
            cart.forEach(item => {
                const subtotal = item.price * item.quantity;
                total += subtotal;
                
                const div = document.createElement('div');
                div.style.cssText = "display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #f0f4f8;";
                div.innerHTML = `
                    <div style="flex:1;">
                        <strong style="color:var(--primary); display:block; font-size:0.95rem;">${item.desc}</strong>
                        <small style="color:var(--text-muted);">Cant: ${item.quantity} x $${item.price.toLocaleString()}</small>
                    </div>
                    <div style="text-align:right; min-width:80px;">
                        <div style="font-weight:700; color:var(--primary);">$${subtotal.toLocaleString()}</div>
                        <button onclick="removeFromCart('${item.sku}')" style="background:none; border:none; color:#fc8181; cursor:pointer; font-size:0.75rem; font-weight:600;">Eliminar</button>
                    </div>
                `;
                cartContent.appendChild(div);
            });
        }
        totalVal.innerText = total.toLocaleString('en-US', { minimumFractionDigits: 2 });
    }

    // 5. ENVÍO DE DATOS PROFESIONAL A WHATSAPP
    function sendWhatsApp() {
        if (cart.length === 0) {
            alert(i18n[currentLang].empty);
            return;
        }

        const phone = "5216122198325"; // Tu número de contacto configurado
        let message = `*SOLICITUD DE COTIZACIÓN | BAJA PRO-SERVICES*\n`;
        message += `━━━━━━━━━━━━━━━━━━━━\n\n`;
        
        cart.forEach(item => {
            message += `✅ *${item.desc}*\n`;
            message += `   • SKU: ${item.sku}\n`;
            message += `   • Cantidad: ${item.quantity}\n`;
            message += `   • Subtotal: *$${(item.price * item.quantity).toLocaleString()} USD*\n\n`;
        });

        const totalFinal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        
        message += `━━━━━━━━━━━━━━━━━━━━\n`;
        message += `💰 *INVERSIÓN TOTAL: $${totalFinal.toLocaleString()} USD*\n\n`;
        message += `📍 *Cobertura:* BCS (La Paz, Cabos, San José)\n`;
        message += `👤 _Buen día, me interesa formalizar la compra de estos equipos._`;

        const encodedMsg = encodeURIComponent(message);
        window.open(`https://wa.me/${phone}?text=${encodedMsg}`, '_blank');
    }
