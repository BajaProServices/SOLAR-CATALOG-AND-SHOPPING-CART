    <style>
:root{--bg:#f8fafc;--card:#fff;--text:#0f172a;--muted:#64748b;--accent:#0f766e;--accent2:#059669;--border:#e2e8f0;--shadow:0 4px 6px -1px rgba(0,0,0,.1)}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.hero{width:100%;max-height:420px;object-fit:cover;display:block}
.container{max-width:1400px;margin:0 auto;padding:32px 20px}
.title{text-align:center;margin-bottom:32px}.title h1{font-size:32px;font-weight:700;margin-bottom:8px}.title p{color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);transition:all .3s}
.card:hover{transform:translateY(-4px);box-shadow:0 10px 15px -3px rgba(0,0,0,.1)}
.card img{width:100%;height:200px;object-fit:contain;background:#fff;padding:16px;border-bottom:1px solid var(--border)}
.card-body{padding:20px}.brand{font-size:20px;font-weight:700;margin-bottom:12px}
.selector{width:100%;padding:12px;border:2px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:#fff;margin-bottom:12px;cursor:pointer;transition:all .2s}
.selector:focus{outline:none;border-color:var(--accent)}
.info{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.precio{font-size:24px;font-weight:700;color:var(--accent)}.stock{font-size:12px;color:var(--muted)}
.qty{display:flex;gap:8px;align-items:center}.qty button{width:36px;height:36px;border:2px solid var(--border);background:#fff;border-radius:8px;cursor:pointer;font-size:18px;transition:all .2s}.qty button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}.qty input{width:50px;height:36px;text-align:center;border:2px solid var(--border);border-radius:8px;font-weight:600}
.total-bar{position:sticky;bottom:0;background:var(--card);border-top:2px solid var(--border);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 -4px 6px -1px rgba(0,0,0,.1)}
.total-amount{font-size:28px;font-weight:700;color:var(--accent)}.btn{background:var(--accent2);color:#fff;border:none;padding:14px 32px;border-radius:10px;font-weight:600;font-size:16px;cursor:pointer;transition:all .2s}.btn:hover{background:var(--accent);transform:scale(1.02)}.btn:disabled{opacity:.5;cursor:not-allowed}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center;padding:20px}.modal.active{display:flex}
.modal-content{background:#fff;border-radius:16px;padding:32px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto}
.modal-content h2{margin-bottom:20px}.form-group{margin-bottom:16px}.form-group label{display:block;margin-bottom:6px;font-weight:500;font-size:14px}.form-group input{width:100%;padding:12px;border:2px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit}.form-group input:focus{outline:none;border-color:var(--accent)}
.error{color:#dc2626;font-size:12px;margin-top:4px;display:none}.error.show{display:block}
@media(max-width:768px){.grid{grid-template-columns:1fr}.title h1{font-size:24px}}

.brand-card { cursor: pointer; text-align: center; padding: 20px; background: var(--card); border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow); transition: all 0.3s; }

.brand-card .brand-name { font-size: 18px; font-weight: 700; color: var(--text); }

.models-container { display: none; margin-top: 20px; }
.models-container.active { display: block; }
.back-btn { margin-bottom: 20px; display: inline-flex; align-items: center; gap: 8px; color: var(--accent); font-weight: 600; cursor: pointer; }
</style>

    const CART = new Map();

    function init() {
        const brandsGrid = document.getElementById('brands-grid');
        brandsGrid.innerHTML = '';
        
        Object.entries(ALMACEN).forEach(([marca, data]) => {
            const card = document.createElement('div');
            card.className = 'brand-card';
            card.onclick = () => showModels(marca);
            card.innerHTML = `
                <img src="https://via.placeholder.com/150?text=${marca}" alt="${marca}">
                <div class="brand-name">${marca}</div>
                <div class="product-count">${data.modelos.length} productos</div>
            `;
            brandsGrid.appendChild(card);
        });
    }

    function showModels(marca) {
        document.getElementById('brands-grid').style.display = 'none';
        document.getElementById('models-view').style.display = 'block';
        document.getElementById('selected-brand-title').textContent = marca;
        
        const modelsGrid = document.getElementById('models-grid');
        modelsGrid.innerHTML = '';
        
        ALMACEN[marca].modelos.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card';
            const cartKey = `${marca}|${m.sku}`;
            const currentQty = CART.has(cartKey) ? CART.get(cartKey).cantidad : 0;
            
            card.innerHTML = `
                <div style="padding:16px; text-align:center; background:#fff;">
                    <img src="https://via.placeholder.com/150?text=${m.sku}" style="height:120px; object-fit:contain;">
                </div>
                <div class="card-body">
                    <div class="brand" style="font-size:14px; min-height:40px;">${m.modelo}</div>
                    <div style="font-size:12px; color:var(--muted); margin-bottom:8px;">SKU: ${m.sku}<br>Volt: ${m.capacidad}</div>
                    <div class="info">
                        <div class="precio">$${m.precio.toLocaleString('en-US')}</div>
                        <div class="stock">Stock: ${m.stock}</div>
                    </div>
                    <div class="qty">
                        <button onclick="cambiarCant('${marca}','${m.sku}',-1)">−</button>
                        <input id="cant-${m.sku}" value="${currentQty}" readonly>
                        <button onclick="cambiarCant('${marca}','${m.sku}',1)">+</button>
                    </div>
                </div>
            `;
            modelsGrid.appendChild(card);
        });
    }

    function showBrands() {
        document.getElementById('brands-grid').style.display = 'grid';
        document.getElementById('models-view').style.display = 'none';
    }

    function cambiarCant(marca, sku, delta) {
        const modelo = ALMACEN[marca].modelos.find(m => m.sku === sku);
        const inp = document.getElementById(`cant-${sku}`);
        let cant = Math.max(0, parseInt(inp.value || 0) + delta);
        cant = Math.min(cant, modelo.stock);
        inp.value = cant;
        
        const key = `${marca}|${sku}`;
        if (cant > 0) {
            CART.set(key, { marca, sku, modelo: modelo.modelo, capacidad: modelo.capacidad, cantidad: cant, precio: modelo.precio });
        } else {
            CART.delete(key);
        }
        actualizarTotal();
    }

    function actualizarTotal() {
        const total = [...CART.values()].reduce((s, i) => s + i.precio * i.cantidad, 0);
        document.getElementById('total').textContent = total.toLocaleString('en-US', { minimumFractionDigits: 2 });
    }

    document.getElementById('btnCotizar').onclick = () => {
        if (CART.size === 0) { alert('Selecciona al menos un producto'); return; }
        document.getElementById('modal').classList.add('active');
    };

    function cerrarModal() { document.getElementById('modal').classList.remove('active'); }

    function validar() {
        let ok = true;
        ['nombre', 'tel', 'email'].forEach(id => {
            const el = document.getElementById(id);
            const err = el.nextElementSibling;
            if (!el.value.trim()) { err.classList.add('show'); ok = false; } else { err.classList.remove('show'); }
        });
        return ok;
    }

    function enviarWA() {
        if (!validar()) return;
        const nombre = document.getElementById('nombre').value;
        const tel = document.getElementById('tel').value;
        const email = document.getElementById('email').value;
        const ciudad = document.getElementById('ciudad').value;
        
        let msg = `*COTIZACIÓN BAJA PRO-SERVICES*\n\n`;
        msg += `*CLIENTE*\nNombre: ${nombre}\nTel: ${tel}\nEmail: ${email}`;
        if (ciudad) msg += `\nCiudad: ${ciudad}`;
        msg += `\n\n*REPORTE DETALLADO DE PEDIDO*\n`;
        msg += `━━━━━━━━━━━━━━━━━━━━\n`;
        
        let total = 0;
        const porMarca = {};
        [...CART.values()].forEach(i => {
            if (!porMarca[i.marca]) porMarca[i.marca] = [];
            porMarca[i.marca].push(i);
        });
        
        Object.entries(porMarca).forEach(([marca, items]) => {
            msg += `\n*${marca}*\n`;
            items.forEach(i => {
                const sub = i.precio * i.cantidad;
                total += sub;
                msg += `  • ${i.modelo}\n`;
                msg += `    Cant: ${i.cantidad} x $${i.precio.toLocaleString('en-US')} = *$${sub.toLocaleString('en-US')}*\n`;
            });
        });
        
        msg += `\n━━━━━━━━━━━━━━━━━━━━\n`;
        msg += `*MONTO TOTAL GLOBAL: $${total.toLocaleString('en-US')} USD*\n`;
        msg += `\n_Enviado desde Catálogo Digital BAJA PRO-SERVICES_`;
        
        window.open(`https://wa.me/5216122198325?text=${encodeURIComponent(msg)}`, '_blank');
        cerrarModal();
    }

    init();
    </script>
