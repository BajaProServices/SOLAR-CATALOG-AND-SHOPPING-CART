        }

            padding: 0;
            box-sizing: border-box;
        }
        
        body {

            background-color: #f8f9fa;
        }
        
        .bg-aqua-base { background-color: var(--aqua-base); }
        .text-aqua-base { color: var(--aqua-base); }
        .border-aqua-base { border-color: var(--aqua-base); }
        .hover-aqua:hover { background-color: var(--aqua-dark); }
        
        .hero-section {
            width: 100%;
            height: 500px;
            background-image: url('hero.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { 
            border-bottom: 4px solid white; 
            font-weight: bold;
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        .card-shadow { 
            box-shadow: 0 10px 30px rgba(0, 150, 136, 0.15);
            transition: all 0.3s ease;
        }
        
        .product-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0, 150, 136, 0.1);
        }
        
        .product-card:hover {

        }

            align-items: center;
            justify-content: center;
            border-radius: 12px 12px 0 0;
            position: relative;
            overflow: hidden;
        }
        
        .product-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            padding: 15px;
        }
        
        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--aqua-base);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;

        .stock-indicator {

            left: 10px;

            font-size: 10px;

        .stock-available {

            align-items: center;

        }

            padding: 8px 16px;

            color: var(--aqua-dark);
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;

        }

            background: var(--aqua-base);

        }
        
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;

            font-size: 32px;

            letter-spacing: 2px;

            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;

        .location-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);

            }

            }

            .locations-title {

        // INITIALIZE APP
        function initApp() {
            renderFilters();
            renderProducts();
            updateCartCounter();
            updateLocationsTitle();
        }

        // UPDATE LOCATIONS TITLE ON LANGUAGE CHANGE
        function updateLocationsTitle() {
            document.getElementById('locations-title').textContent = translations[currentLang].locations;
        }

        // RENDER FILTER BUTTONS
        function renderFilters() {
            const brands = ['TODOS', ...new Set(products.map(p => p.brand))];
            const container = document.getElementById('filter-buttons');
            
            container.innerHTML = brands.map(brand => `
                <button class="filter-btn ${brand === 'TODOS' ? 'active' : ''}" 
                        onclick="filterByBrand('${brand}')">
                    ${brand}
                </button>
            `).join('');
        }

        // FILTER PRODUCTS BY BRAND
        function filterByBrand(brand) {
            selectedBrand = brand === 'TODOS' ? null : brand;
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.trim() === brand) {
                    btn.classList.add('active');
                }
            });
            
            renderProducts();
        }

        // RENDER PRODUCTS
        function renderProducts() {
            const filtered = selectedBrand 
                ? products.filter(p => p.brand === selectedBrand)
                : products;

            // Group by brand and model
            const grouped = {};
            filtered.forEach(product => {
                if (!grouped[product.brand]) {
                    grouped[product.brand] = {};
                }
                if (!grouped[product.brand][product.model]) {
                    grouped[product.brand][product.model] = [];
                }
                grouped[product.brand][product.model].push(product);
            });

            const container = document.getElementById('products-container');
            let html = '';

            Object.entries(grouped).forEach(([brand, models]) => {
                html += `
                    <div class="brand-section">
                        <div class="brand-header">
                            <div class="brand-icon">${brand.charAt(0)}</div>
                            <h2 class="brand-title">${brand}</h2>
                        </div>
                `;

                Object.entries(models).forEach(([model, items]) => {
                    html += `
                        <div class="model-subheader">
                            <h4>${model}</h4>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mb-8">
                    `;

                    items.forEach(product => {
                        const stockClass = product.stock > 10 ? 'stock-available' : 
                                          product.stock > 0 ? 'stock-low' : 'stock-unavailable';
                        const stockText = product.stock > 0 ? `${product.stock} ${translations[currentLang].stock}` : 'Agotado';

                        html += `
                            <div class="bg-white rounded-lg card-shadow product-card overflow-hidden">
                                <div class="product-image">
                                    <span style="font-size: 60px;">${product.image}</span>
                                    <span class="badge">${product.category}</span>
                                    <span class="stock-indicator ${stockClass}">${stockText}</span>
                                </div>
                                <div class="p-4">
                                    <h3 class="font-bold text-aqua-dark text-sm mb-2 line-clamp-2">${product.name}</h3>
                                    <p class="text-xs text-slate-500 font-mono mb-3">${translations[currentLang].sku}: ${product.sku}</p>
                                    <div class="mb-3">
                                        <p class="text-xs text-slate-600 mb-1">${translations[currentLang].voltage}: <strong>${product.voltage}</strong></p>
                                    </div>
                                    <div class="price-tag">$${product.price.toLocaleString()}<span class="price-currency">USD</span></div>
                                    <button class="btn-add-cart mt-4" onclick="addToCart('${product.sku}')" ${product.stock === 0 ? 'disabled' : ''}>
                                        <i class="fas fa-shopping-cart"></i>
                                        ${translations[currentLang].addToCart}
                                    </button>
                                </div>
                            </div>
                        `;
                    });

                    html += `</div>`;
                });

                html += `</div>`;
            });

            container.innerHTML = html || '<p class="text-center text-slate-400">No hay productos disponibles</p>';
        }

        // ADD TO CART
        function addToCart(sku) {
            const product = products.find(p => p.sku === sku);
            if (!product || product.stock === 0) return;

            const existingItem = cart.find(item => item.sku === sku);
            
            if (existingItem) {
                if (existingItem.qty < product.stock) {
                    existingItem.qty++;
                }
            } else {
                cart.push({ ...product, qty: 1 });
            }

            updateCartUI();
            updateCartCounter();
            
            // Show cart
            if (!document.getElementById('cart-sidebar').classList.contains('open')) {
                toggleCart();
            }
        }

        // UPDATE CART UI
        function updateCartUI() {
            const container = document.getElementById('cart-items');
            const totalDisplay = document.getElementById('cart-total');

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-bag"></i>
                        <p>${translations[currentLang].emptyCart}</p>
                    </div>
                `;
                totalDisplay.textContent = '$0.00';
                return;
            }

            let total = 0;
            let html = '';

            cart.forEach(item => {
                const subtotal = item.price * item.qty;
                total += subtotal;

                html += `
                    <div class="cart-item">
                        <div class="cart-item-image">
                            <span style="font-size: 28px;">${item.image}</span>
                        </div>
                        <div class="cart-item-details">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-sku">${item.sku}</div>
                            <div class="flex justify-between items-center">
                                <div class="cart-item-controls">
                                    <button onclick="changeQty('${item.sku}', -1)">−</button>
                                    <span class="cart-item-qty">${item.qty}</span>
                                    <button onclick="changeQty('${item.sku}', 1)">+</button>
                                </div>
                                <div class="cart-item-price">$${subtotal.toLocaleString()}</div>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            totalDisplay.textContent = `$${total.toLocaleString()}`;
        }

        // CHANGE QUANTITY
        function changeQty(sku, delta) {
            const item = cart.find(i => i.sku === sku);
            const product = products.find(p => p.sku === sku);

            if (item) {
                item.qty += delta;
                if (item.qty <= 0) {
                    cart = cart.filter(i => i.sku !== sku);
                } else if (item.qty > product.stock) {
                    item.qty = product.stock;
                }
            }

            updateCartUI();
            updateCartCounter();
        }

        // UPDATE CART COUNTER
        function updateCartCounter() {
            const counter = document.getElementById('cart-counter');
            const total = cart.reduce((sum, item) => sum + item.qty, 0);
            counter.textContent = total;
        }

        // TOGGLE CART
        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            const overlay = document.getElementById('cart-overlay');
            
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        // CHANGE LANGUAGE
        function changeLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            
            // Update translations
            document.getElementById('filter-label').textContent = translations[lang].filterLabel;
            document.getElementById('cart-title').textContent = translations[lang].cartTitle;
            document.getElementById('total-label').textContent = translations[lang].totalLabel;
            document.getElementById('checkout-btn').textContent = translations[lang].checkoutBtn;
            document.getElementById('empty-cart-msg').textContent = translations[lang].emptyCart;
            
            updateLocationsTitle();
            renderProducts();
            updateCartUI();
        }

        // SEND WHATSAPP
        function sendWhatsApp() {
            if (cart.length === 0) {
                alert(translations[currentLang].emptyCart);
                return;
            }

            let total = 0;
            let message = currentLang === 'es' 
                ? '*SOLICITUD DE COTIZACIÓN - BAJA PRO-SERVICES*\n'
                : '*QUOTE REQUEST - BAJA PRO-SERVICES*\n';
            
            message += '═══════════════════════════════════\n';

            cart.forEach(item => {
                const subtotal = item.price * item.qty;
                total += subtotal;
                message += `\n📦 *${item.brand} - ${item.model}*\n`;
                message += `📝 ${item.name}\n`;
                message += `🔹 SKU: ${item.sku}\n`;
                message += `💡 Cantidad: ${item.qty} × $${item.price.toLocaleString()} USD\n`;
                message += `💰 Subtotal: $${subtotal.toLocaleString()} USD\n`;
                message += '───────────────────────────────────\n';
            });

            message += `\n*TOTAL: $${total.toLocaleString()} USD*\n`;
            message += '═══════════════════════════════════';

            const encodedMsg = encodeURIComponent(message);
            window.open(`https://wa.me/526122198325?text=${encodedMsg}`, '_blank');
        }

        // INITIALIZE ON LOAD
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
